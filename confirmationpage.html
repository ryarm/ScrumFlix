<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Vanelly Odette">
    <meta name="description" content="Scrumflix Theatre Cart Page">
    <title>Scrumflix Cart</title>
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/layout.css" rel="stylesheet" />
</head>
<body>
    <header class="page-header">
        <nav style="text-align: center;">
            <a href="index.html" style="margin: 0 10px;">Home</a>
            <a href="Movies.html" style="margin: 0 10px;">Movies</a>
            <a href="Theatres.html" style="margin: 0 10px;">Theatres</a>
            <a href="contact.html" style="margin: 0 10px;">Contact</a>
        </nav>
        <div style="text-align: center;">
            <img src="images/Movie Theatre Icon sm.png" alt="Scrumflix Logo" class="logo">
        </div>
        <h1>SCRUMFLIX THEATRE NORTH CENTRAL</h1>
    </header>

    <main class="content">
        <h2>SCRUMFLIX THEATRE CART</h2>

        <!-- Cart Table -->
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Movie</th>
                    <th>Time</th>
                    <th>Theatre</th>
                    <th>Seats</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Grand Total -->
        <h2>Grand Total: $<span id="grandTotal">0</span></h2>

        <!-- Checkout and Clear Cart Buttons -->
        <div style="text-align: center;">
            <button onclick="checkout()">Checkout</button>
            <button onclick="clearCart()">Clear Cart</button>
        </div>
    </main>

    <footer class="w3-container w3-center w3-margin-top">
        <p>&copy; 2026 Scrumflix | INEW 2332-2 Project</p>
        <ul style="list-style-type: none; padding: 0;">
            <li>
                <a href="https://www.dallascollege.edu/">Dallas College</a> .
                <a href="mailto:scrumflix@dcccd.onmicrosoft.com">Webmaster</a>
            </li>
        </ul>
    </footer>

    <script>
        // Load cart data from localStorage
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const tbody = document.querySelector("#cartTable tbody");

        // Function to load cart data and display in table
        function loadCart() {
            tbody.innerHTML = ""; // Clear previous cart items
            let grandTotal = 0;

            cart.forEach((item, index) => {
                let total = item.price * item.seats;
                grandTotal += total;

                const row = `
                    <tr>
                        <td>${item.movie}</td>
                        <td>${item.time}</td>
                        <td>${item.location}</td>
                        <td>
                            <input type="number" value="${item.seats}" min="1"
                            onchange="updateSeats(${index}, this.value)">
                        </td>
                        <td>$${item.price}</td>
                        <td>$${total}</td>
                        <td><button onclick="removeItem(${index})">X</button></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Update grand total display
            document.getElementById("grandTotal").textContent = grandTotal;
        }

        // Function to update seat count for an item in the cart
        function updateSeats(index, seats) {
            cart[index].seats = seats;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart(); // Reload cart to reflect changes
        }

        // Function to remove an item from the cart
        function removeItem(index) {
            cart.splice(index, 1); // Remove item from cart array
            localStorage.setItem("cart", JSON.stringify(cart)); // Update localStorage
            loadCart(); // Reload cart to reflect changes
        }

        // Function to clear the entire cart
        function clearCart() {
            localStorage.removeItem("cart"); // Remove cart data from localStorage
            cart = []; // Clear the cart array
            loadCart(); // Reload cart to reflect changes
        }

        // Function to handle the checkout and redirect to the confirmation page
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty! Please add items to the cart.");
                return;
            }

            // Redirect to the confirmation page (confirm.html) with cart data in localStorage
            window.location.href = "confirmation.html"; // Change to the actual confirmation page URL
        }

        // Load the cart data when the page is loaded
        loadCart();
    </script>
</body>
</html>
