<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Vanelly Odette" />
    <meta name="description" content="Movie Ticket Confirmation" />
    <title>Movie Ticket Confirmation</title>
    <meta name="theme-color" content="#ffffff">
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/layout.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .ticket-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 20px auto;
        }

        .ticket-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .ticket-details {
            margin-bottom: 15px;
        }

        .ticket-footer {
            font-size: 14px;
            color: #555;
        }

        .button {
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #555;
        }

        .movie-poster {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .qr-container {
            margin-top: 20px;
        }
    </style>

    <!-- Include QRCode.js library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>
<body>

<h1>Your Movie Ticket</h1>

<div class="ticket-container">
    <div class="ticket-header">Thank you for your purchase!</div>

    <div id="ticketContent"></div>

    <div class="qr-container">
        <h3>Scan Your Ticket</h3>
        <div id="qrcode"></div>
    </div>

    <button class="button" onclick="window.location.href='index.html'">Back to Home</button>
</div>

<script>
    // Retrieve the ticket information from localStorage
    const ticketInfo = JSON.parse(localStorage.getItem("ticketInfo"));

    if (ticketInfo && ticketInfo.length > 0) {
        let ticketHTML = "";
        let qrData = ""; // Data for the QR code

        ticketInfo.forEach(item => {
            ticketHTML += `
                <div class="ticket-details">
                    <h3>${item.movie}</h3>
                    <img src="images/${item.movie.toLowerCase().replace(/\s+/g, '-')}.jpg" alt="${item.movie}" class="movie-poster">
                    <p><strong>Time:</strong> ${item.time}</p>
                    <p><strong>Theatre:</strong> ${item.location}</p>
                    <p><strong>Seats:</strong> ${item.seats}</p>
                    <p><strong>Total: $${item.total}</strong></p>
                </div>
                <hr>
            `;

            // Collect ticket info for the QR code (concatenate into a string)
            qrData += `${item.movie} | ${item.time} | ${item.location} | Seats: ${item.seats} | Total: $${item.total}\n`;
        });

        document.getElementById("ticketContent").innerHTML = ticketHTML;

        // Generate QR code with the ticket info
        QRCode.toCanvas(document.getElementById("qrcode"), qrData, function (error) {
            if (error) console.error(error);
            console.log("QR code generated!");
        });

        // Remove ticket info from localStorage after rendering the ticket
        localStorage.removeItem("ticketInfo");
    } else {
        document.getElementById("ticketContent").innerHTML = "<p>Oops! There was an issue with your purchase.</p>";
    }
</script>

</body>
</html>
