<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Vanelly Odette" />
    <meta name="description" content="Scrumflix Contact Page" />
    <title>Contact Us</title>
    <meta name="theme-color" content="#ffffff">
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/layout.css" rel="stylesheet" />
</head>
<body>

<header class="page-header">
    <nav style="text-align: center;">
        <a href="index.html" style="margin: 0 10px;">Home</a> 
        <a href="Movies.html" style="margin: 0 10px;">Movies</a>  
        <a href="contact.html" style="margin: 0 10px;">Contact</a>
    </nav>

    <div style="text-align: center;">
        <img src="images/Movie Theatre Icon sm.png" alt="Scrumflix Logo" class="logo">
    </div>

    <h1 style="text-align: center;">SCRUMFLIX THEATRE CONTACT</h1>
</header>

<main class="content">
<div style="text-align: center;">
    <div class="schedule-box">
    <h2>Contact Our Theatres</h2>
    <div id="contactInfo">
        <p>Select a theatre to view contact information.</p>
    </div>
    <label for="theatreSelect">Select Theatre Location:</label>
    <select id="theatreSelect">
        <option value="">-- Select Theatre --</option>
        <option value="northgate">Northgate Theatre</option>
        <option value="west">West Side Theatre</option>
        <option value="downtown">Downtown Theatre</option>
    </select>

    <h3 id="theatreAddress"> - - - - -</h3>

    <hr style="width:60%; margin:30px auto;">

    <h2>Complaint Hotline</h2>
    <p>Call our 24/7 customer service line:</p>
    <h3>(877) 555-1234</h3>

    <hr style="width:60%; margin:30px auto;">

    <h2>Send Us a Message</h2>

    <form style="width: 60%; margin: auto;">
        <label>Name:</label><br>
        <input type="text" name="name" required style="width: 80%;"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required style="width: 80%;"><br><br>

        <label>Message:</label><br>
        <textarea name="message" rows="5" style="width: 80%;"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
    </div>
</div>
</main>

<footer class="w3-container w3-center w3-margin-top" style="text-align: center;">
    <p>&copy; 2026VOM | INEW 2332-2 Project</p>
    <ul style="list-style-type: none; padding: 0;">
        <li>
            <a href="https://www.dallascollege.edu/">Dallas College</a> .
            <a href="mailto:scrumflix@dcccd.onmicrosoft.com">Webmaster</a>
        </li>
    </ul>
</footer>

<script>
document.getElementById("theatreSelect").addEventListener("change", function() {
    const addressDisplay = document.getElementById("theatreAddress");
    const theatre = this.value;

    if (theatre === "northgate") {
        addressDisplay.textContent = "Northgate Theatre - 1234 Northgate Blvd, Dallas, TX 75201";
    } 
    else if (theatre === "west") {
        addressDisplay.textContent = "West Side Theatre - 5678 West Commerce St, Dallas, TX 75208";
    } 
    else if (theatre === "downtown") {
        addressDisplay.textContent = "Downtown Theatre - 910 Main St, Dallas, TX 75202";
    } 
    else {
        addressDisplay.textContent = "- - - - - -";
    }
});
</script>

</body>
</html>
