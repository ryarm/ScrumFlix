<!DOCTYPE html>
<html>
<head>
    <title>ScrumFlix Cart</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .nav {
            background-color: #111;
            padding: 15px;
        }

        .nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .nav a:hover {
            color: red;
        }

        .cart-container {
            margin-top: 40px;
        }

        .movie {
            border: 1px solid white;
            margin: 20px auto;
            padding: 15px;
            width: 300px;
        }

        button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
    </div>

    <div class="cart-container">
        <h1>Your Cart</h1>

        <div class="movie">
            <h2>Movie Title</h2>
            <p>Price: $9.99</p>
            <button>Remove</button>
        </div>

        <div class="movie">
            <h2>Another Movie</h2>
            <p>Price: $12.99</p>
            <button>Remove</button>
        </div>

        <h2>Total: $22.98</h2>
    </div>

</body>
</html>
